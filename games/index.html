<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Score Dashboard</title>
    <!-- Load Tailwind CSS for styling -->
    <script src="tailwind.js"></script>
    <!-- Load SheetJS (xlsx) for Excel import/export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Load PDF.js for PDF presentation support -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Load canvas-confetti for game rewards -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Custom styles for appearance and transitions */
        body {
            font-family: 'Inter', sans-serif;
        }
        .tab-content {
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
        }
        .page-enter {
            opacity: 0;
            transform: translateY(8px);
        }
        .page-enter-active {
            opacity: 1;
            transform: translateY(0);
        }
        .page-exit {
            opacity: 1;
        }
        .page-exit-active {
            opacity: 0;
            transform: translateY(-6px);
        }

        /* Basic modal backdrop */
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.4);
            transition: opacity 0.3s;
        }
        .modal-content {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- Styles from slideshow file --- */
        .slide-container {
            aspect-ratio: 16 / 9; /* Standard presentation aspect ratio */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            background-color: #1e293b; /* Dark background */
        }
        #slideImage {
            transition: opacity 0.3s ease-in-out;
        }

        /* --- NEW: Styles for Maximized Slideshow --- */
        .slideshow-fullscreen-backdrop {
            position: fixed;
            inset: 0;
            background-color: rgba(10, 20, 40, 0.9);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .slideshow-fullscreen-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .slideshow-fullscreen-img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 0.75rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.75);
            transition: opacity 0.3s ease-in-out;
        }
        .slideshow-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 9999px;
            width: 3.5rem; /* 56px */
            height: 3.5rem; /* 56px */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        .slideshow-nav-btn:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.2);
        }
        .slideshow-nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .slideshow-close-btn {
             position: absolute;
             top: 1.5rem;
             right: 2rem;
             background-color: rgba(255, 255, 255, 0.1);
             color: white;
             border: 1px solid rgba(255, 255, 255, 0.2);
             border-radius: 9999px;
             width: 2.5rem; /* 40px */
             height: 2.5rem; /* 40px */
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-white to-blue-50 p-4 sm:p-6">
    <div id="app" class="max-w-6xl mx-auto">
        <!-- Application content will be rendered here -->
    </div>

    <script>
        // --- Application State ---
        const state = {
            students: [],
            page: "add", // 'add', 'update', 'leaderboard', 'slideshow'
            form: { name: "", class: "", subject: "", gender: "" },
            filterClass: "",
            filterSubject: "",
            filterChapter: "",
            statusMessage: "",
            confirmationData: null, // { type: 'student' | 'clearAll', id?: number, name?: string }
            slideImages: [],
            currentSlideIndex: 0,
            slideshowMaximized: false, // Controls the fullscreen view
            isSidebarOpen: true,       // Controls presenter sidebar in fullscreen
            spinnerActive: false,      // Controls the spinning wheel modal
            spinnerSelectedStudent: null, // Result of the spin
            milestoneTargets: {},      // Per-chapter milestone arrays e.g. { '1': [10, 30, 60] }
            milestonePopup: null,      // { studentName, avatar, milestoneIndex, total, isFinal }
            personalSpinnerActive: false,
            personalSpinnerStudent: null,
            personalSpinnerResult: null
        };

        // --- Constants and Helpers ---
        const classOptions = ["", "6", "7", "8", "9", "10", "11", "12"];
        const subjectOptions = ["", "Maths", "Physics", "Chemistry", "Biology", "Computer Science"];
        const chapterOptions = ["", ...Array.from({ length: 20 }, (_, i) => String(i + 1))];
        const sampleStudents = [
            { id: 1, name: "Aisha", gender: "girl", class: "10", subject: "Maths", scores: { '5': 12, '3': 10 }, avatar: "https://api.dicebear.com/7.x/adventurer/svg?seed=Aisha" },
            { id: 2, name: "Rohit", gender: "boy", class: "10", subject: "Maths", scores: { '3': 8 }, avatar: "https://api.dicebear.com/7.x/pixel-art/svg?seed=Rohit" },
            { id: 3, name: "Sana", gender: "girl", class: "11", subject: "Physics", scores: { '12': 15, '1': 18 }, avatar: "https://api.dicebear.com/7.x/adventurer/svg?seed=Sana" },
            { id: 4, name: "Vikram", gender: "boy", class: "9", subject: "Chemistry", scores: { '1': 5 }, avatar: "https://api.dicebear.com/7.x/pixel-art/svg?seed=Vikram" },
        ];

        let fileInputRef;

        /**
         * Generic WebAudio tone generator.
         */
        function playTone(freq = 440, duration = 150, type = 'sine', vol = 0.06) {
            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                if (!AC) return;
                const ctx = new AC();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = type;
                o.frequency.value = freq;
                g.gain.setValueAtTime(vol, ctx.currentTime);
                g.gain.linearRampToValueAtTime(0, ctx.currentTime + duration / 1000); // fade out
                o.connect(g);
                g.connect(ctx.destination);
                o.start();
                setTimeout(() => {
                    try { o.stop(); ctx.close(); } catch (e) {}
                }, duration);
            } catch (err) {
                // ignore audio errors
            }
        }

        /**
         * Plays a "reward achieving" sound effect.
         * @param {number} val The score value to determine the sound complexity.
         */
        function playPositiveSound(val) {
            const baseFreq = 523.25; // C5
            playTone(baseFreq, 80, 'triangle');
            setTimeout(() => playTone(baseFreq * 1.25, 80, 'triangle'), 80); // E5
            if (val > 1) {
                setTimeout(() => playTone(baseFreq * 1.5, val > 2 ? 120 : 80, 'triangle'), 160); // G5
            }
        }

        /**
         * Plays a "reward reducing" sound effect.
         */
        function playNegativeSound() {
            playTone(349.23, 120, 'sawtooth', 0.04); // F4
            setTimeout(() => playTone(329.63, 150, 'sawtooth', 0.04), 100); // E4
        }

        /**
         * Sound effects for the spinner ticks and win.
         */
        function playTickSound() {
            playTone(800, 30, 'sine', 0.03);
        }

        function playWinSound() {
            const baseFreq = 523.25; // C5
            playTone(baseFreq, 100, 'sine', 0.1);
            setTimeout(() => playTone(baseFreq * 1.5, 100, 'sine', 0.1), 100);
            setTimeout(() => playTone(baseFreq * 2, 400, 'sine', 0.15), 200);
        }

        function triggerConfetti() {
            if (typeof confetti === 'function') {
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#ec4899', '#eab308', '#6366f1', '#10b981', '#3b82f6']
                });
            }
        }

        let spinnerInterval;

        function startSpinner() {
            const filtered = getFilteredStudents();
            if (filtered.length === 0) {
                setState({ statusMessage: "No students in filter to spin for."});
                setTimeout(() => setState({ statusMessage: "" }), 2000);
                return;
            }
            if (!state.filterChapter) {
                setState({ statusMessage: "Warning: No chapter selected."});
                setTimeout(() => setState({ statusMessage: "" }), 2000);
            }
            
            setState({ spinnerActive: true, spinnerSelectedStudent: null });

            let speed = 40;
            let ticks = 0;
            const maxTicks = 40 + Math.floor(Math.random() * 20);

            const spin = () => {
                // While spinning, randomly show a student's avatar in the target div
                if (!state.spinnerActive) return; // cancelled

                const targetEl = document.getElementById('spinner-target');
                if (targetEl && !state.spinnerSelectedStudent) {
                     const randomStudent = filtered[Math.floor(Math.random() * filtered.length)];
                     targetEl.innerHTML = `
                         <img src="${randomStudent.avatar}" class="w-24 h-24 rounded-full border-4 border-indigo-500 mx-auto mb-4 bg-white/90 shadow-lg" />
                         <div class="text-2xl font-bold text-white drop-shadow">${randomStudent.name}</div>
                         <div class="text-sm text-indigo-300 mt-1">${randomStudent.class} • ${randomStudent.subject}</div>
                     `;
                     playTickSound();
                }

                ticks++;
                if (ticks < maxTicks) {
                    if (ticks > maxTicks - 20) speed += 15;
                    if (ticks > maxTicks - 8) speed += 40;
                    spinnerInterval = setTimeout(spin, speed);
                } else {
                    const finalStudent = filtered[Math.floor(Math.random() * filtered.length)];
                    playWinSound();
                    setState({ spinnerSelectedStudent: finalStudent });
                }
            };
            spin();
        }

        function closeSpinner() {
            clearTimeout(spinnerInterval);
            setState({ spinnerActive: false, spinnerSelectedStudent: null });
        }

        let personalSpinnerInterval;

        function startPersonalSpinner(studentId) {
            if (!state.filterChapter) {
                setState({ statusMessage: "Warning: No chapter selected for recording points."});
                setTimeout(() => setState({ statusMessage: "" }), 2000);
                return;
            }
            
            const student = state.students.find(s => s.id === studentId);
            if (!student) return;

            setState({ personalSpinnerActive: true, personalSpinnerStudent: student, personalSpinnerResult: null });

            let speed = 40;
            let ticks = 0;
            const maxTicks = 30 + Math.floor(Math.random() * 20);
            
            const possiblePoints = [3, 2, 1, 0]; // No negatives

            const spin = () => {
                if (!state.personalSpinnerActive) return;

                const targetEl = document.getElementById('personal-spinner-target');
                if (targetEl && state.personalSpinnerResult === null) {
                     const randomPoint = possiblePoints[Math.floor(Math.random() * possiblePoints.length)];
                     let color = randomPoint > 0 ? 'text-green-400' : 'text-yellow-400';
                     targetEl.innerHTML = `
                         <div class="text-6xl font-black ${color} drop-shadow-[0_0_15px_currentColor] animate-pulse">${randomPoint > 0 ? '+' : ''}${randomPoint}</div>
                     `;
                     playTickSound();
                }

                ticks++;
                if (ticks < maxTicks) {
                    if (ticks > maxTicks - 15) speed += 20;
                    personalSpinnerInterval = setTimeout(spin, speed);
                } else {
                    const finalPoint = possiblePoints[Math.floor(Math.random() * possiblePoints.length)];
                    if (finalPoint > 0) playWinSound();
                    setState({ personalSpinnerResult: finalPoint });
                }
            };
            spin();
        }

        function closePersonalSpinner() {
            clearTimeout(personalSpinnerInterval);
            setState({ personalSpinnerActive: false, personalSpinnerStudent: null, personalSpinnerResult: null });
        }



        /**
         * Checks if the XLSX library is loaded globally.
         * @returns {boolean}
         */
        function isXLSXReady() {
            return typeof window.XLSX !== 'undefined';
        }

        /**
         * Gets unique class, subject, and chapter options for filtering from all student data.
         * @returns {{classes: string[], subjects: string[], chapters: string[]}}
         */
        function getFilterOptions() {
            const classesSet = new Set(state.students.map(p => String(p.class)).filter(Boolean));
            const subjectsSet = new Set(state.students.map(p => p.subject).filter(Boolean));
            const chaptersSet = new Set();
            state.students.forEach(student => {
                if (student.scores) {
                    Object.keys(student.scores).forEach(chapter => chaptersSet.add(chapter));
                }
            });
            return {
                classes: ["", ...Array.from(classesSet).sort()],
                subjects: ["", ...Array.from(subjectsSet).sort()],
                chapters: ["", ...Array.from(chaptersSet).sort((a,b) => Number(a) - Number(b))],
            };
        }

        /**
         * Filters the students based on class and subject. Chapter is used for score display, not filtering the list.
         * @returns {Array<Object>}
         */
        function getFilteredStudents() {
            return state.students.filter((p) => {
                return (
                    (state.filterClass ? String(p.class) === String(state.filterClass) : true) &&
                    (state.filterSubject ? p.subject === state.filterSubject : true)
                );
            });
        }

        // --- Persistence Functions ---

        /**
         * Saves current students to localStorage.
         */
        function persistStudents() {
            try {
                localStorage.setItem("students_v1_html", JSON.stringify(state.students));
            } catch (e) {
                console.error("Failed to save to localStorage:", e);
            }
        }

        /**
         * Loads students from localStorage or sample data.
         */
        function loadStudents() {
            const saved = localStorage.getItem("students_v1_html");
            if (saved) {
                try {
                    state.students = JSON.parse(saved);
                    // Ensure scores object exists for backward compatibility
                    state.students.forEach(s => { if (!s.scores) s.scores = {}; });
                    state.statusMessage = "Loaded students from localStorage";
                    return;
                } catch (e) {
                    console.error("Error parsing localStorage, falling back to sample:", e);
                }
            }

            // Fallback to sample data
            state.students = sampleStudents;
            state.statusMessage = "Could not load previous data — using sample data.";
        }


        // --- Actions / Mutators ---

        /**
         * Sets a new state and triggers a re-render.
         * @param {Object} newState
         */
        function setState(newState) {
            Object.assign(state, newState);
            renderApp();
            // Debounced persistence: save after a short delay to avoid saving every score click immediately
            clearTimeout(window._persistTimer);
            window._persistTimer = setTimeout(persistStudents, 500);
        }

        function handleFormChange(key, value) {
            setState({ form: { ...state.form, [key]: value } });
        }

        function addStudent(e) {
            e.preventDefault();
            if (!state.form.name || !state.form.class || !state.form.subject || !state.form.gender) {
                setState({ statusMessage: "Please fill all fields." });
                return;
            }

            const avatarStyle = state.form.gender === 'boy' ? 'initials' : 'initials';
            const avatarUrl = `https://api.dicebear.com/9.x/${avatarStyle}/svg?seed=${encodeURIComponent(state.form.name.trim())}`;

            const nextStudent = {
                id: Date.now(),
                name: state.form.name.trim(),
                gender: state.form.gender,
                class: state.form.class,
                subject: state.form.subject,
                scores: {}, // Scores are now an object, initialized empty
                avatar: avatarUrl,
            };

            const newStudents = [nextStudent, ...state.students];
            setState({
                students: newStudents,
                form: { name: "", class: "", subject: "", gender: "" },
                page: "update",
                statusMessage: "Student added. Now select a chapter on the 'Update' tab to add scores."
            });
        }

        /**
         * Returns the sorted milestone array for a given chapter.
         * Falls back to [50] if none set.
         */
        function getChapterMilestones(chapter) {
            const raw = state.milestoneTargets[chapter];
            if (Array.isArray(raw) && raw.length > 0) return raw;
            return [50];
        }

        function incScore(id, val) {
            if (!state.filterChapter) {
                setState({ statusMessage: "Please select a chapter to update scores." });
                setTimeout(() => setState({ statusMessage: "" }), 2000);
                return;
            }

            const milestones = getChapterMilestones(state.filterChapter);
            let hitMilestone = null; // { index, isFinal }
            let updatedStudent = null;

            const newStudents = state.students.map((p) => {
                if (p.id === id) {
                    const newP = { ...p };
                    if (!newP.scores) newP.scores = {};
                    const currentScore = Number(newP.scores[state.filterChapter] || 0);
                    const newScore = currentScore + val;
                    newP.scores[state.filterChapter] = newScore;

                    // Check each milestone in order — find the first one just crossed
                    milestones.forEach((threshold, idx) => {
                        if (currentScore < threshold && newScore >= threshold) {
                            // Only store the highest milestone crossed in this single increment
                            if (!hitMilestone || idx > hitMilestone.index) {
                                hitMilestone = { index: idx, isFinal: idx === milestones.length - 1 };
                                updatedStudent = newP;
                            }
                        }
                    });
                    return newP;
                }
                return p;
            });

            if (hitMilestone && updatedStudent) {
                // Don't call setState yet - set the popup data AFTER students
                state.students = newStudents;
                const popupData = {
                    studentName: updatedStudent.name,
                    avatar: updatedStudent.avatar,
                    milestoneIndex: hitMilestone.index,
                    total: milestones.length,
                    threshold: milestones[hitMilestone.index],
                    isFinal: hitMilestone.isFinal,
                };
                playWinSound();
                triggerConfetti();
                setTimeout(triggerConfetti, 350);
                setTimeout(triggerConfetti, 700);
                setState({ milestonePopup: popupData });
            } else {
                setState({ students: newStudents });
                if (val > 0) {
                    playPositiveSound(val);
                    if (val >= 3) triggerConfetti();
                } else if (val < 0) {
                    playNegativeSound();
                }
            }
        }

        function dismissMilestonePopup() {
            setState({ milestonePopup: null });
        }

        function startDelete(studentId, studentName) {
            setState({ confirmationData: { type: 'student', id: studentId, name: studentName } });
        }

        function startClearAll() {
            setState({ confirmationData: { type: 'clearAll' } });
        }

        function handleConfirm() {
            const data = state.confirmationData;
            if (!data) return;

            if (data.type === 'student') {
                const newStudents = state.students.filter((p) => p.id !== data.id);
                setState({ students: newStudents, confirmationData: null, statusMessage: `Student ${data.name} deleted` });
            } else if (data.type === 'clearAll') {
                state.students = [];
                localStorage.removeItem('students_v1_html');
                setState({ students: [], confirmationData: null, statusMessage: 'Cleared students and localStorage' });
            }
        }

        function handleCancel() {
            setState({ confirmationData: null });
        }

        function importExcelFile(file) {
            if (!isXLSXReady()) {
                setState({ statusMessage: "XLSX library not ready. Please wait a moment." });
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = e.target.result;
                    const workbook = window.XLSX.read(data, { type: "array" });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = window.XLSX.utils.sheet_to_json(sheet);
                    
                    const studentsMap = {};
                    json.forEach((row, i) => {
                        const name = row.name ? String(row.name) : "";
                        if (!name) return; // Skip rows without a name

                        // Use a composite key of name+class+subject to identify a student
                        const studentKey = `${name}-${row.class}-${row.subject}`;

                        if (!studentsMap[studentKey]) {
                            const genderRaw = String(row.gender || 'boy').toLowerCase();
                            const gender = (genderRaw === 'girl' || genderRaw === 'female') ? 'girl' : 'boy';
                            const avatarStyle = gender === 'boy' ? 'pixel-art' : 'adventurer';
                            const avatar = String(row.avatar || `https://api.dicebear.com/7.x/${avatarStyle}/svg?seed=${encodeURIComponent(name || i)}`);

                            studentsMap[studentKey] = {
                                id: row.id || Date.now() + i,
                                name: name,
                                gender: gender,
                                class: String(row.class || ""),
                                subject: String(row.subject || ""),
                                avatar: avatar,
                                scores: {}
                            };
                        }

                        const chapter = String(row.chapter || "");
                        const score = Number(row.score || 0);
                        if(chapter) {
                           studentsMap[studentKey].scores[chapter] = score;
                        }
                    });

                    const parsed = Object.values(studentsMap);
                    setState({ students: parsed, statusMessage: "Imported Excel file successfully" });

                } catch (err) {
                    console.error(err);
                    setState({ statusMessage: "Failed to parse Excel file. It must contain columns: name, class, subject, gender, chapter, score." });
                }
            };
            reader.onerror = () => setState({ statusMessage: "Failed to read file" });
            reader.readAsArrayBuffer(file);
        }

        function exportToExcel() {
            if (!isXLSXReady()) {
                setState({ statusMessage: "XLSX library not ready. Cannot export." });
                return;
            }
            if (!state.students || state.students.length === 0) {
                setState({ statusMessage: "No students to export" });
                return;
            }

            // Flatten the data: one row per student per chapter score
            const dataToExport = [];
            state.students.forEach(s => {
                if (Object.keys(s.scores).length > 0) {
                    for (const chapter in s.scores) {
                        dataToExport.push({
                            id: s.id,
                            name: s.name,
                            gender: s.gender,
                            class: s.class,
                            subject: s.subject,
                            avatar: s.avatar,
                            chapter: chapter,
                            score: s.scores[chapter],
                        });
                    }
                } else {
                    // Include students even if they have no scores yet
                     dataToExport.push({
                        id: s.id, name: s.name, gender: s.gender, class: s.class, 
                        subject: s.subject, avatar: s.avatar, chapter: '', score: 0
                    });
                }
            });

            const ws = window.XLSX.utils.json_to_sheet(dataToExport);
            const wb = window.XLSX.utils.book_new();
            window.XLSX.utils.book_append_sheet(wb, ws, "Students");
            window.XLSX.writeFile(wb, "student_scores_by_chapter.xlsx");
            setState({ statusMessage: "Exported student_scores_by_chapter.xlsx" });
        }

        // --- Slideshow Functions (Adapted for Dashboard State) ---

        async function handlePdfUpload(event) {
            const files = event.target.files;
            if (files.length === 0) return;
            const file = files[0];
            if (file.type !== 'application/pdf') {
                setState({ statusMessage: "Please select a valid PDF file." });
                return;
            }

            setState({ statusMessage: "Reading PDF... (this may take a moment for large files)", slideImages: [], currentSlideIndex: 0 });

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const typedarray = new Uint8Array(e.target.result);
                    const pdfjsLib = window['pdfjs-dist/build/pdf'];
                    
                    if (!pdfjsLib) {
                        throw new Error("PDF.js library failed to load from CDN. Check your internet connection.");
                    }

                    // Set worker
                    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

                    // Parse Document
                    const loadingTask = pdfjsLib.getDocument({ data: typedarray });
                    const pdf = await loadingTask.promise;
                    const totalPages = pdf.numPages;
                    const newSlideImages = [];

                    setState({ statusMessage: `Rendering PDF slides (0/${totalPages})...` });

                    for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                        const page = await pdf.getPage(pageNum);
                        const viewport = page.getViewport({ scale: 2.0 }); // Adjusting scale for memory safety
                        
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        const renderContext = {
                            canvasContext: context,
                            viewport: viewport
                        };

                        await page.render(renderContext).promise;
                        
                        // Convert canvas to image URL. Using jpeg to save memory.
                        newSlideImages.push(canvas.toDataURL('image/jpeg', 0.8));
                        
                        // Update progress occasionally
                        if (pageNum % 2 === 0 || pageNum === totalPages) {
                            setState({ statusMessage: `Rendering PDF slides (${pageNum}/${totalPages})...` });
                        }
                    }

                    setState({ 
                        slideImages: newSlideImages, 
                        statusMessage: `Successfully loaded ${totalPages} slides from PDF.`
                    });

                } catch (err) {
                    console.error("PDF Parsing Error:", err);
                    setState({ statusMessage: "Error reading PDF: " + (err.message || "Unknown error. Check console.") });
                }
            };
            
            reader.onerror = () => {
                setState({ statusMessage: "Failed to read the file from your computer." });
            };
            
            reader.readAsArrayBuffer(file);
        }

        function handleFileUpload(event) {
            const files = event.target.files;
            if (files.length === 0) return;

            // Reset state and show loading message
            setState({ statusMessage: `Loading ${files.length} slide(s)...`, slideImages: [], currentSlideIndex: 0 });
            
            const fileReadingPromises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    if (!file.type.startsWith('image/')) {
                        resolve(null); // Resolve with null for non-image files
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => resolve({ url: e.target.result, name: file.name });
                    reader.onerror = () => resolve(null);
                    reader.readAsDataURL(file);
                });
            });

            Promise.all(fileReadingPromises).then(results => {
                const validSlides = results
                    .filter(Boolean) // Filter out nulls from failed reads or non-images
                    .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));

                const slideUrls = validSlides.map(slide => slide.url);
                
                if (slideUrls.length > 0) {
                     setState({ 
                        slideImages: slideUrls, 
                        statusMessage: `${slideUrls.length} slides loaded successfully.`
                    });
                } else {
                     setState({ 
                        slideImages: [], 
                        statusMessage: "No valid image files were found." 
                    });
                }
            });
        }

        function changeSlide(delta) {
            if (state.slideImages.length === 0) return;
            const newIndex = state.currentSlideIndex + delta;
            if (newIndex >= 0 && newIndex < state.slideImages.length) {

                setState({ currentSlideIndex: newIndex });
            }
        }

        /**
         * Renders the Confirmation Modal (replaces alert/confirm).

         */
        function renderConfirmationModal() {
            if (!state.confirmationData) return '';
            
            const data = state.confirmationData;
            const isClearAll = data.type === 'clearAll';
            const title = isClearAll ? 'Confirm Clear All' : 'Confirm Deletion';
            const message = isClearAll 
                ? 'Are you sure you want to clear ALL student data? This action is permanent and clears localStorage.' 
                : `Are you sure you want to delete student: ${data.name}? This will remove the student and all their scores across all chapters.`;

            return `
                <div id="confirmation-modal" class="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4 opacity-100 transition-opacity">
                    <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full border border-red-200 modal-content transform scale-100">
                        <h3 class="text-xl font-bold mb-3 text-red-600 flex items-center">

                            ${title}
                        </h3>
                        <p class="text-slate-600 mb-6">${message}</p>
                        
                        <div class="flex justify-end space-x-3">

                                onclick="handleCancel()" 
                                class="px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-100 transition"
                            >
                                Cancel
                            </button>
                            <button 
                                onclick="handleConfirm()" 
                                class="px-4 py-2 rounded-lg bg-red-600 text-white font-semibold shadow-md hover:bg-red-700 transition active:scale-98"
                            >
                                ${isClearAll ? 'Yes, Clear All' : 'Delete'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * Renders the Milestone Achievement Popup overlay.
         */
        function renderMilestonePopup() {
            if (!state.milestonePopup) return '';
            const m = state.milestonePopup;
            const milestoneNum = m.milestoneIndex + 1;
            const label = m.isFinal
                ? '🏆 FINAL MILESTONE ACHIEVED!'
                : `🎯 Milestone ${milestoneNum} Achieved!`;
            const sublabel = m.isFinal
                ? `${m.studentName} has conquered all milestones!`
                : `${m.studentName} reached ${m.threshold} points — keep going!`;
            const bgGrad = m.isFinal
                ? 'from-yellow-900 via-yellow-700 to-orange-600'
                : 'from-indigo-900 via-purple-900 to-pink-900';
            const ringColor = m.isFinal ? 'border-yellow-400' : 'border-pink-400';
            const glowColor = m.isFinal ? 'rgba(234,179,8,0.6)' : 'rgba(236,72,153,0.5)';

            return `
                <div class="fixed inset-0 z-[300] flex items-center justify-center bg-black/75 backdrop-blur-lg">

                            <div class="text-lg text-white/80 mb-6">${sublabel}</div>
                            ${!m.isFinal ? `
                            <div class="flex justify-center gap-2 mb-6">
                                ${Array.from({length: m.total}, (_, i) => `<div class="w-3 h-3 rounded-full ${i < milestoneNum ? 'bg-pink-400' : 'bg-white/20'}"></div>`).join('')}
                            </div>
                            ` : '<div class="text-5xl mb-6 animate-bounce">🎉🏆🎉</div>'}

                                ${m.isFinal ? '🎊 Amazing! Continue' : '▶ Resume Presenting'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

                document.body.appendChild(newSlideshowContainer);
            }
            document.getElementById('slideshow-modal-container').innerHTML = renderMaximizedSlideshow();

            // Render spinner modal separately
            const spinnerModalContainer = document.getElementById('spinner-modal-container');
            if (!spinnerModalContainer) {
                const newSpinnerContainer = document.createElement('div');
                newSpinnerContainer.id = 'spinner-modal-container';
                document.body.appendChild(newSpinnerContainer);
            }
            document.getElementById('spinner-modal-container').innerHTML = renderSpinnerModal() || "";

            // Render personal spinner modal separately
            const personalSpinnerModalContainer = document.getElementById('personal-spinner-modal-container');
            if (!personalSpinnerModalContainer) {
                const newSpinnerContainer = document.createElement('div');
                newSpinnerContainer.id = 'personal-spinner-modal-container';
                document.body.appendChild(newSpinnerContainer);
            }
            document.getElementById('personal-spinner-modal-container').innerHTML = renderPersonalSpinnerModal() || "";

            // Render milestone popup separately
            const msPopupContainer = document.getElementById('milestone-popup-container');
            if (!msPopupContainer) {
                const el = document.createElement('div');
                el.id = 'milestone-popup-container';
                document.body.appendChild(el);
            }
            document.getElementById('milestone-popup-container').innerHTML = renderMilestonePopup() || "";


            // Set up the hidden file input element and its reference (needed for Excel import)
            let existingFileInput = document.getElementById('file-input');
            if (!existingFileInput) {
                existingFileInput = document.createElement('input');
                existingFileInput.type = 'file';
                existingFileInput.id = 'file-input';
                existingFileInput.accept = '.xlsx,.xls';
                existingFileInput.style.display = 'none';
                existingFileInput.onchange = (e) => {
                    if (e.target.files && e.target.files[0]) {
                        importExcelFile(e.target.files[0]);
                        // Clear the input value so the same file can be imported again
                        e.target.value = null; 
                    }
                };
                document.body.appendChild(existingFileInput);
            }
            fileInputRef = existingFileInput;
        }

        // Add keyboard navigation for the slideshow page
        document.addEventListener('keydown', (e) => {
            if (state.slideshowMaximized) {
                if (e.key === 'ArrowRight' || e.key === ' ') {
                    e.preventDefault();
                    changeSlide(1);
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    changeSlide(-1);
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    setState({ slideshowMaximized: false });
                }
                return; // Stop further execution if maximized view is handled
            }

            // Handle normal page view slideshow navigation
            if (state.page === 'slideshow') {
                if (e.key === 'ArrowRight' || e.key === ' ') {
                    e.preventDefault();
                    changeSlide(1);
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    changeSlide(-1);
                }
            }
        });

        // --- Initialization ---
        window.onload = function() {
            loadStudents();
            renderApp();
            
            // Initial check for XLSX load status (for user feedback)
            if (state.statusMessage.includes("sample data") && isXLSXReady()) {
                 setState({ statusMessage: "Using sample data. XLSX library is ready for Import/Export." });
            }
        };
    </script>
</body>
</html>
