<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student - Edu Home Admin</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <script src="js/security.js"></script>

    <div class="container mt-5">
        <div class="page-header">
            <h2><a href="index.html" class="text-dark"><i class="fas fa-arrow-left"></i></a> Add New Student</h2>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="form-section">
                    <form id="addStudentForm">
                        <input type="hidden" id="studentId">
                        <div class="form-group">
                            <label>Student Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>

                        <div class="form-group">
                            <label>Class</label>
                            <select class="form-control" id="class" required>
                                <option value="">Select Class</option>
                                <option value="6">Class 6</option>
                                <option value="7">Class 7</option>
                                <option value="8">Class 8</option>
                                <option value="9">Class 9</option>
                                <option value="10">Class 10</option>
                                <option value="11">Class 11</option>
                                <option value="12">Class 12</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Subjects (Select Multiple)</label>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" name="subject" value="Physics"
                                        id="phy">
                                    <label class="form-check-label" for="phy">Physics</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" name="subject" value="Chemistry"
                                        id="chem">
                                    <label class="form-check-label" for="chem">Chemistry</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" name="subject" value="Maths"
                                        id="math">
                                    <label class="form-check-label" for="math">Maths</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" name="subject" value="Biology"
                                        id="bio">
                                    <label class="form-check-label" for="bio">Biology</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" name="subject"
                                        value="Computer Science" id="cs">
                                    <label class="form-check-label" for="cs">Computer Science</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Date of Joining</label>
                            <input type="date" class="form-control" id="joiningDate" required>
                        </div>

                        <div class="form-group">
                            <label>Monthly Fee Amount (₹) <small class="text-muted">(auto-calculated)</small></label>
                            <input type="number" class="form-control" id="amount" placeholder="Select class &amp; subjects above" readonly style="background:#f8f9fa;cursor:not-allowed;">
                            <small id="feeHint" class="form-text text-info"></small>
                        </div>

                        <div class="form-group">
                            <label>School</label>
                            <input type="text" class="form-control" id="school" required>
                        </div>

                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" class="form-control" id="phone" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block mb-3" id="submitStudentBtn">Add
                            Student</button>
                        <a href="index.html" class="btn btn-secondary btn-block">Back to Dashboard</a>
                    </form>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-5 mb-5">
            <div class="col-md-10">
                <h3 class="text-center mb-3">Manage Students</h3>
                <div class="table-responsive bg-white p-3 shadow-sm rounded">
                    <table class="table table-bordered table-striped" id="studentManagementTable">
                        <thead class="thead-dark">
                            <tr>
                                <th>Name</th>
                                <th>Class</th>
                                <th>Monthly Fee</th>
                                <th>Phone</th>
                                <th>Subjects</th>
                                <th style="width: 100px;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="studentListBody">
                            <!-- Students populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>

    <script>
    // ── Auto Fee Calculator ──────────────────────────────────────────────────
    // Mirrors the exact fee logic from fee_calculator.js
    // Physics / Chemistry / Biology all count as "Science" for classes 6-9

    const FEE_RULES = {
        '6':  { hint: 'Maths ₹500 | Maths + Science ₹1000' },
        '7':  { hint: 'Maths ₹600 | Maths + Science ₹1200' },
        '8':  { hint: 'Maths ₹750 | Maths + Science ₹1500' },
        '9':  { hint: 'Maths ₹1000 | Science ₹1000 | Maths + Science ₹2000' },
        '10': { hint: '1 subject ₹1000 | 2 subjects ₹2000 | 3+ subjects ₹3000 (Maths+Phy+Chem+Bio package)' },
        '11': { hint: '1 sub ₹1500 | 2 subs ₹2500 | 3 subs ₹3500 | 4 subs ₹4500' },
        '12': { hint: '1 sub ₹1500 | 2 subs ₹2500 | 3 subs ₹3500 | 4 subs ₹4500' }
    };

    function getSelectedSubjects() {
        return Array.from(document.querySelectorAll('input[name="subject"]:checked'))
                    .map(cb => cb.value);
    }

    function hasMaths(subs)   { return subs.includes('Maths'); }
    // Physics, Chemistry, Biology all map to Science for lower classes
    function hasScience(subs) {
        return subs.includes('Physics') || subs.includes('Chemistry') || subs.includes('Biology');
    }

    function calculateFee(cls, subs) {
        if (!cls || subs.length === 0) return '';

        switch(cls) {
            // Class 6 – Maths ₹500, Maths+Science ₹1000
            case '6':
                if (hasMaths(subs) && hasScience(subs)) return 1000;
                if (hasMaths(subs))                     return 500;
                if (hasScience(subs))                   return 1000; // science without maths = full package
                return '';

            // Class 7 – Maths ₹600, Maths+Science ₹1200
            case '7':
                if (hasMaths(subs) && hasScience(subs)) return 1200;
                if (hasMaths(subs))                     return 600;
                if (hasScience(subs))                   return 1200;
                return '';

            // Class 8 – Maths ₹750, Maths+Science ₹1500
            case '8':
                if (hasMaths(subs) && hasScience(subs)) return 1500;
                if (hasMaths(subs))                     return 750;
                if (hasScience(subs))                   return 1500;
                return '';

            // Class 9 – Maths ₹1000, Science ₹1000, Maths+Science ₹2000
            case '9': {
                const m = hasMaths(subs), s = hasScience(subs);
                if (m && s) return 2000;
                if (m || s) return 1000;
                return '';
            }

            // Class 10 – ₹1000/₹2000/₹3000
            case '10': {
                // Count distinct "billing units": Maths counts as 1, science subjects each count as 1
                const units = new Set();
                if (hasMaths(subs)) units.add('maths');
                if (subs.includes('Physics'))   units.add('physics');
                if (subs.includes('Chemistry')) units.add('chemistry');
                if (subs.includes('Biology'))   units.add('biology');
                const count = units.size;
                if (count === 0) return '';
                if (count === 1) return 1000;
                if (count === 2) return 2000;
                return 3000; // 3 or 4 individual subjects = package price
            }

            // Class 11 & 12 – ₹1500/₹2500/₹3500/₹4500 (up to 4 subjects)
            case '11':
            case '12': {
                const count = subs.length;
                if (count === 0) return '';
                if (count === 1) return 1500;
                if (count === 2) return 2500;
                if (count === 3) return 3500;
                return 4500;
            }

            default: return '';
        }
    }

    function updateAutoFee() {
        const cls  = document.getElementById('class').value;
        const subs = getSelectedSubjects();
        const fee  = calculateFee(cls, subs);
        const amountField = document.getElementById('amount');
        const hint        = document.getElementById('feeHint');

        if (fee !== '') {
            amountField.value = fee;
            hint.textContent  = '';
        } else {
            amountField.value = '';
            hint.textContent  = cls && FEE_RULES[cls]
                ? '💡 ' + FEE_RULES[cls].hint
                : 'Select class and subjects to auto-fill fee.';
        }
    }

    // Attach listeners
    document.getElementById('class').addEventListener('change', updateAutoFee);
    document.querySelectorAll('input[name="subject"]').forEach(cb => {
        cb.addEventListener('change', updateAutoFee);
    });
    </script>
</body>

</html>
